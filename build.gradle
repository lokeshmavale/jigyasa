plugins {
    id 'java'
    id 'java-library'
    id 'maven-publish'
    id 'com.google.protobuf' version '0.9.6'
    id 'com.gradleup.shadow' version '9.0.0-beta12'
    id 'idea'
    id 'jvm-test-suite'
    id 'application'
    id 'me.champeau.jmh' version '0.7.3'
    id 'com.github.spotbugs' version '6.1.3'
}

application {
    mainClass = 'com.jigyasa.dp.search.entrypoint.Main'
    // Production JVM flags:
    // --add-modules jdk.incubator.vector — enables Lucene SIMD vectorization (4-8x faster HNSW)
    // -XX:+AlwaysPreTouch — pre-faults heap pages into RAM (prevents swap-induced GC spikes)
    // -Dlucene.useScalarFMA=true — enable FMA for scalar distance computations
    // -Dlucene.useVectorFMA=true — enable FMA for SIMD distance computations
    applicationDefaultJvmArgs = [
        '--add-modules', 'jdk.incubator.vector',
        '-XX:+AlwaysPreTouch',
        '-Dlucene.useScalarFMA=true',
        '-Dlucene.useVectorFMA=true'
    ]
}

// --- Version Catalog ---
def luceneVer    = '10.4.0'
def grpcVer      = '1.80.0'
def protoVer     = '4.34.1'
def lombokVer    = '1.18.36'
def guiceVer     = '7.0.0'
def autoServiceVer = '1.1.1'
def jacksonVer   = '2.18.2'
def slf4jVer     = '2.0.16'
def logbackVer   = '1.5.16'
def junitVer     = '5.11.4'

repositories {
    mavenCentral()
}

dependencies {
    // --- Logging (SLF4J + Logback) ---
    implementation "org.slf4j:slf4j-api:${slf4jVer}"
    runtimeOnly "ch.qos.logback:logback-classic:${logbackVer}"

    // --- Lucene 10.4 ---
    implementation "org.apache.lucene:lucene-core:${luceneVer}"
    implementation "org.apache.lucene:lucene-analysis-common:${luceneVer}"
    implementation "org.apache.lucene:lucene-analysis-stempel:${luceneVer}"       // Polish
    implementation "org.apache.lucene:lucene-analysis-morfologik:${luceneVer}"    // Ukrainian
    implementation "org.apache.lucene:lucene-queryparser:${luceneVer}"
    implementation "org.apache.lucene:lucene-queries:${luceneVer}"
    implementation "org.apache.lucene:lucene-highlighter:${luceneVer}"
    implementation "org.apache.lucene:lucene-memory:${luceneVer}"
    implementation "org.apache.lucene:lucene-expressions:${luceneVer}"
    implementation "org.apache.lucene:lucene-facet:${luceneVer}"

    // --- gRPC + Protobuf ---
    implementation "com.google.protobuf:protobuf-java:${protoVer}"
    implementation "com.google.protobuf:protobuf-java-util:${protoVer}"
    implementation "io.grpc:grpc-protobuf:${grpcVer}"
    implementation "io.grpc:grpc-netty:${grpcVer}"
    implementation "io.grpc:grpc-services:${grpcVer}"

    // --- DI & Codegen ---
    implementation "com.google.inject:guice:${guiceVer}"
    implementation "com.google.auto.service:auto-service:${autoServiceVer}"
    annotationProcessor "com.google.auto.service:auto-service:${autoServiceVer}"
    compileOnly "org.projectlombok:lombok:${lombokVer}"
    annotationProcessor "org.projectlombok:lombok:${lombokVer}"

    // --- Serialization ---
    implementation "com.fasterxml.jackson.core:jackson-databind:${jacksonVer}"
    implementation 'com.google.code.gson:gson:2.11.0'

    // --- Native access (memory locking via mlockall/VirtualLock) ---
    implementation 'net.java.dev.jna:jna:5.16.0'
    implementation 'net.java.dev.jna:jna-platform:5.16.0'

    // --- Utilities ---
    implementation 'org.apache.commons:commons-lang3:3.17.0'
    implementation 'commons-io:commons-io:2.18.0'
    implementation 'javax.annotation:javax.annotation-api:1.3.2'

    // --- Testing ---
    testImplementation "org.junit.jupiter:junit-jupiter:${junitVer}"
    testImplementation 'org.assertj:assertj-core:3.27.3'
    testImplementation 'org.mockito:mockito-core:5.15.2'
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
}

test {
    useJUnitPlatform()
}

protobuf {
    protoc {
        artifact = "com.google.protobuf:protoc:${protoVer}"
    }
    plugins {
        grpc {
            artifact = "io.grpc:protoc-gen-grpc-java:${grpcVer}"
        }
    }
    generateProtoTasks {
        all()*.plugins {
            grpc {}
        }
    }
}

compileJava {
    options.encoding = 'UTF-8'
}

group = 'com.jigyasa.search'
version = System.getenv('GITHUB_REF_NAME')?.replaceFirst('^v', '') ?: '1.0-SNAPSHOT'
description = 'Jigyasa — Lucene-based search engine'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
            artifactId = 'jigyasa'

            pom {
                name = 'Jigyasa'
                description = 'Lightweight Elasticsearch alternative — full-text, vector, and hybrid search in a single JAR'
                url = 'https://github.com/lokeshmavale/engram'
                licenses {
                    license {
                        name = 'Apache License 2.0'
                        url = 'https://www.apache.org/licenses/LICENSE-2.0'
                    }
                }
                developers {
                    developer {
                        id = 'lokeshmavale'
                        name = 'Lokesh Mawale'
                    }
                }
            }
        }
    }
    repositories {
        maven {
            name = 'GitHubPackages'
            url = uri("https://maven.pkg.github.com/${System.getenv('GITHUB_REPOSITORY') ?: 'lokeshmavale/engram'}")
            credentials {
                username = System.getenv('GITHUB_ACTOR') ?: ''
                password = System.getenv('GITHUB_TOKEN') ?: ''
            }
        }
    }
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}

jmh {
    iterations = 5
    warmupIterations = 3
    fork = 1
    threads = 1
    benchmarkMode = ['thrpt', 'avgt']
    timeUnit = 'ms'
    resultFormat = 'TEXT'
    failOnError = true
    jvmArgs = ['--add-modules', 'jdk.incubator.vector']
}

// --- SpotBugs static analysis ---
spotbugs {
    toolVersion = '4.8.6'
    effort = com.github.spotbugs.snom.Effort.valueOf('MAX')
    reportLevel = com.github.spotbugs.snom.Confidence.valueOf('MEDIUM')
    excludeFilter = file("$rootDir/spotbugs-exclude.xml")
}

spotbugsMain {
    reports {
        html.required = true
        xml.required = true
    }
}

// Don't run SpotBugs on test code or generated proto stubs
spotbugsTest.enabled = false
spotbugsJmh.enabled = false
